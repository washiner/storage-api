services:
  postgres:
    image: postgres:16
    container_name: storage_postgres
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - storage_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: storage_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  minio:
    image: minio/minio
    container_name: storage_minio
    # comando que inicia o MinIO em modo servidor
    # console-address é a porta da interface web de administração
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # porta da API — onde seu Java vai se conectar
      - "9001:9001"   # porta do console web — onde você vai administrar
    volumes:
      - storage_minio_data:/data

volumes:
  storage_postgres_data:
  storage_minio_data: